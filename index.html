// ── 유틸리티 ──
function genPassword() {
  return String(Math.floor(1000 + Math.random() * 9000));
}

function parseProblems(input) {
  const parts = input.split(',').map(s => s.trim()).filter(Boolean);
  const nums = [];
  for (const p of parts) {
    const rangeMatch = p.match(/^(\d+)\s*[~\-]\s*(\d+)$/);
    if (rangeMatch) {
      const start = parseInt(rangeMatch[1]);
      const end = parseInt(rangeMatch[2]);
      for (let i = Math.min(start, end); i <= Math.max(start, end); i++) nums.push(i);
    } else if (/^\d+$/.test(p)) {
      nums.push(parseInt(p));
    }
  }
  return [...new Set(nums)].sort((a, b) => a - b);
}

async function makeLoginId(prefix, name, table) {
  const base = prefix + name;
  const { data } = await sb.from(table).select('login_id').like('login_id', base + '%');
  if (!data || data.length === 0) return base;
  const existing = new Set(data.map(r => r.login_id));
  if (!existing.has(base)) return base;
  let i = 2;
  while (existing.has(base + i)) i++;
  return base + i;
}

const DB = {
  async getTeachers() { const { data } = await sb.from('omr_teachers').select('*').order('created_at'); return data || []; },
  async getClasses(teacherId) {
    let q = sb.from('omr_classes').select('*').order('created_at');

    const { data } = await q; return data || [];

    if (loginId === 'admin' && password === ADMIN_CODE) {

    setLoading(true);
    // Try teacher
    const { data: teacher } = await sb.from('omr_teachers').select('*').eq('login_id', loginId).eq('password', password).maybeSingle();
    if (teacher) { setLoading(false); onLogin({ role: 'teacher', user: teacher }); return; }
    // Try student
    const { data: student } = await sb.from('omr_students').select('*').eq('login_id', loginId).eq('password', password).maybeSingle();

          <p className="text-gray-500 text-sm mt-1">온라인 숙제 시스템</p>

// ── 비밀번호 변경 모달 ──
function PasswordModal({ role, user, onClose, onChanged }) {
  const [current, setCurrent] = useState('');
  const [newPw, setNewPw] = useState('');
  const [confirm, setConfirm] = useState('');
  const [error, setError] = useState('');

  const handleChange = async () => {
    if (current !== user.password) { setError('현재 비밀번호가 틀립니다.'); return; }
    if (!/^\d{4}$/.test(newPw)) { setError('새 비밀번호는 4자리 숫자여야 합니다.'); return; }
    if (newPw !== confirm) { setError('새 비밀번호가 일치하지 않습니다.'); return; }
    const table = role === 'teacher' ? 'omr_teachers' : 'omr_students';
    await sb.from(table).update({ password: newPw }).eq('id', user.id);
    onChanged(newPw);
    onClose();
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50" onClick={onClose}>
      <div className="bg-white rounded-xl p-6 w-full max-w-sm" onClick={e => e.stopPropagation()}>
        <h3 className="text-lg font-bold mb-4">비밀번호 변경</h3>
        <div className="space-y-3">
          <input className="w-full border rounded-lg px-3 py-2" type="password" placeholder="현재 비밀번호" value={current} onChange={e => setCurrent(e.target.value)} />
          <input className="w-full border rounded-lg px-3 py-2" type="password" placeholder="새 비밀번호 (4자리 숫자)" value={newPw} onChange={e => setNewPw(e.target.value)} />
          <input className="w-full border rounded-lg px-3 py-2" type="password" placeholder="새 비밀번호 확인" value={confirm} onChange={e => setConfirm(e.target.value)} />
          {error && <p className="text-red-500 text-sm">{error}</p>}
        </div>
        <div className="flex gap-2 mt-4">
          <button className="flex-1 bg-gray-200 rounded-lg py-2" onClick={onClose}>취소</button>
          <button className="flex-1 bg-blue-600 text-white rounded-lg py-2" onClick={handleChange}>변경</button>
        </div>
      </div>
    </div>
  );
}

function ClassManager({ classes, selectedClass, onSelect, teacherId, onReload }) {
  const [name, setName] = useState('');

  const addClass = async () => {
    if (!name.trim()) return;
    const { data } = await sb.from('omr_classes').insert({ name: name.trim(), teacher_id: teacherId }).select().single();
    setName('');
    await onReload();
    if (data) onSelect(data);
  };

  const deleteClass = async (c) => {
    if (!confirm(`"${c.name}" 반을 삭제하시겠습니까? 소속 학생과 과제가 모두 삭제됩니다.`)) return;
    await sb.from('omr_classes').delete().eq('id', c.id);
    onReload();
  };

  return (
    <div>
      <h2 className="text-lg font-bold mb-3">반 관리</h2>
      <div className="flex gap-2 mb-3">
        <input className="flex-1 border rounded-lg px-3 py-2" placeholder="반 이름 (예: 고1 수학A반)" value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === 'Enter' && addClass()} />
        <button className="bg-blue-600 text-white px-4 rounded-lg" onClick={addClass}>추가</button>
      </div>
      <div className="flex flex-wrap gap-2">
        {classes.map(c => (
          <div key={c.id} className={`flex items-center gap-1 px-3 py-2 rounded-lg cursor-pointer border-2 ${selectedClass?.id === c.id ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:border-gray-300'}`} onClick={() => onSelect(c)}>
            <span className="font-medium">{c.name}</span>
            <button className="ml-1 text-red-400 hover:text-red-600 text-xs" onClick={e => { e.stopPropagation(); deleteClass(c); }}>✕</button>
          </div>
        ))}
        {classes.length === 0 && <p className="text-gray-400">반을 추가해주세요.</p>}
      </div>
    </div>
  );
}

// ── 과제 관리 ──
function HomeworkManager({ classId }) {
  const [homeworks, setHomeworks] = useState([]);
  const [title, setTitle] = useState('');
  const [rangeInput, setRangeInput] = useState('');
  const [preview, setPreview] = useState([]);

  const load = async () => { setHomeworks(await DB.getHomeworks(classId)); };
  useEffect(() => { load(); }, [classId]);

  const handleRangeChange = (val) => {
    setRangeInput(val);
    setPreview(parseProblems(val));
  };

  const createHomework = async () => {
    if (!title.trim()) { alert('과제명을 입력하세요.'); return; }
    if (preview.length === 0) { alert('문제번호 범위를 입력하세요.'); return; }
    await sb.from('omr_homeworks').insert({ title: title.trim(), class_id: classId, problems: preview });
    setTitle(''); setRangeInput(''); setPreview([]);
    load();
  };

  const deleteHomework = async (h) => {
    if (!confirm(`"${h.title}" 과제를 삭제하시겠습니까?`)) return;
    await sb.from('omr_homeworks').delete().eq('id', h.id);
    load();
  };

  return (
    <div className="bg-white rounded-xl shadow p-6">
      <h2 className="text-lg font-bold mb-4">과제 관리</h2>
      <div className="space-y-3 mb-4 border-b pb-4">
        <input className="w-full border rounded-lg px-3 py-2" placeholder="과제명 (예: 수능특강 1단원)" value={title} onChange={e => setTitle(e.target.value)} />
        <input className="w-full border rounded-lg px-3 py-2" placeholder="문제번호 범위 (예: 43~64, 87, 90~95)" value={rangeInput} onChange={e => handleRangeChange(e.target.value)} />
        {preview.length > 0 && (
          <div className="bg-blue-50 rounded-lg p-3">
            <p className="text-sm text-blue-700 mb-1">미리보기 ({preview.length}문제)</p>
            <p className="text-sm text-blue-900">{preview.join(', ')}</p>
          </div>
        )}
        <button className="bg-blue-600 text-white px-6 py-2 rounded-lg" onClick={createHomework}>과제 등록</button>
      </div>
      <div className="space-y-2">
        {homeworks.map(h => (
          <div key={h.id} className="flex items-center justify-between bg-gray-50 rounded-lg p-3">
            <div>
              <span className="font-medium">{h.title}</span>
              <span className="text-gray-500 text-sm ml-2">({h.problems.length}문제)</span>
              <p className="text-xs text-gray-400 mt-1">{h.problems.join(', ')}</p>
            </div>
            <button className="text-sm text-red-600 hover:underline" onClick={() => deleteHomework(h)}>삭제</button>
          </div>
        ))}
        {homeworks.length === 0 && <p className="text-gray-400 text-center py-4">등록된 과제가 없습니다.</p>}
      </div>
    </div>
  );
}

  const load = async () => {
    const [hw, st] = await Promise.all([DB.getHomeworks(classId), DB.getStudents(classId)]);
    setHomeworks(hw);
    setStudents(st);
    if (hw.length > 0 && !selectedHw) setSelectedHw(hw[0]);
  };
  useEffect(() => { load(); }, [classId]);

  const loadSubmissions = async () => {
    if (!selectedHw) return;
    setSubmissions(await DB.getSubmissions(selectedHw.id));
  };
  useEffect(() => { loadSubmissions(); }, [selectedHw]);

  const submittedIds = new Set(submissions.map(s => s.student_id));
  const submittedStudents = students.filter(s => submittedIds.has(s.id));
  const unsubmittedStudents = students.filter(s => !submittedIds.has(s.id));

  // 오답률 통계
  const errorRates = useMemo(() => {
    if (!selectedHw || submissions.length === 0) return {};
    const rates = {};
    for (const p of selectedHw.problems) {
      let wrong = 0, total = 0;
      for (const sub of submissions) {
        if (sub.results && sub.results[String(p)] !== undefined) {
          total++;
          if (sub.results[String(p)] === 'X') wrong++;
        }
      }
      rates[p] = total > 0 ? Math.round((wrong / total) * 100) : null;
    }
    return rates;
  }, [selectedHw, submissions]);

  const getColor = (rate) => {
    if (rate === null) return 'bg-gray-100';
    if (rate === 0) return 'bg-blue-100';
    if (rate <= 25) return 'bg-green-100';
    if (rate <= 50) return 'bg-yellow-100';
    if (rate <= 75) return 'bg-orange-100';
    return 'bg-red-100';
  };

  const getStudentSubmission = (studentId) => submissions.find(s => s.student_id === studentId);

  return (
    <div className="space-y-4">
      {/* 과제 선택 */}
      <div className="bg-white rounded-xl shadow p-4">
        <h2 className="text-lg font-bold mb-3">제출 현황</h2>
        <div className="flex flex-wrap gap-2">
          {homeworks.map(h => (
            <button key={h.id} className={`px-3 py-2 rounded-lg border-2 ${selectedHw?.id === h.id ? 'border-blue-500 bg-blue-50 font-medium' : 'border-gray-200 hover:border-gray-300'}`} onClick={() => setSelectedHw(h)}>{h.title}</button>
          ))}
        </div>
      </div>

      {selectedHw && (
        <>
          {/* 제출 현황 요약 */}
          <div className="bg-white rounded-xl shadow p-4">
            <div className="flex items-center gap-4 mb-4">
              <h3 className="font-bold">{selectedHw.title}</h3>
              <span className="text-sm bg-blue-100 text-blue-800 px-2 py-1 rounded">{submittedStudents.length}/{students.length}명 제출</span>
              <button className="text-sm text-blue-600 hover:underline ml-auto" onClick={loadSubmissions}>새로고침</button>
            </div>

            {/* 제출 학생 */}
            <div className="mb-3">
              <p className="text-sm font-medium text-green-700 mb-1">제출 완료 ({submittedStudents.length}명)</p>
              <div className="flex flex-wrap gap-2">
                {submittedStudents.map(s => {
                  const sub = getStudentSubmission(s.id);
                  return (
                    <button key={s.id} className="bg-green-50 border border-green-200 rounded-lg px-3 py-1.5 text-sm hover:bg-green-100" onClick={() => setDetailStudent(detailStudent?.id === s.id ? null : s)}>
                      {s.name} <span className="text-green-600">({sub?.correct_count}O/{sub?.wrong_count}X)</span>
                    </button>
                  );
                })}
              </div>
            </div>

            {/* 미제출 학생 */}
            {unsubmittedStudents.length > 0 && (
              <div>
                <p className="text-sm font-medium text-red-700 mb-1">미제출 ({unsubmittedStudents.length}명)</p>
                <div className="flex flex-wrap gap-2">
                  {unsubmittedStudents.map(s => (
                    <span key={s.id} className="bg-red-50 border border-red-200 rounded-lg px-3 py-1.5 text-sm">{s.name}</span>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* 학생 상세 결과 */}
          {detailStudent && getStudentSubmission(detailStudent.id) && (
            <div className="bg-white rounded-xl shadow p-4">
              <h3 className="font-bold mb-3">{detailStudent.name} 상세 결과</h3>
              <div className="grid grid-cols-5 sm:grid-cols-8 md:grid-cols-10 gap-2">
                {selectedHw.problems.map(p => {
                  const result = getStudentSubmission(detailStudent.id)?.results?.[String(p)];
                  return (
                    <div key={p} className={`text-center rounded-lg p-2 ${result === 'O' ? 'bg-blue-100' : result === 'X' ? 'bg-red-100' : 'bg-gray-100'}`}>
                      <div className="text-xs text-gray-500">{p}번</div>
                      <div className={`font-bold ${result === 'O' ? 'text-blue-600' : 'text-red-600'}`}>{result || '-'}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* 문항별 오답률 통계 */}
          {submissions.length > 0 && (
            <div className="bg-white rounded-xl shadow p-4">
              <h3 className="font-bold mb-3">문항별 오답률</h3>
              <div className="flex flex-wrap gap-1 mb-3">
                <span className="text-xs px-2 py-1 rounded bg-blue-100">0%</span>
                <span className="text-xs px-2 py-1 rounded bg-green-100">1~25%</span>
                <span className="text-xs px-2 py-1 rounded bg-yellow-100">26~50%</span>
                <span className="text-xs px-2 py-1 rounded bg-orange-100">51~75%</span>
                <span className="text-xs px-2 py-1 rounded bg-red-100">76~100%</span>
              </div>
              <div className="grid grid-cols-5 sm:grid-cols-8 md:grid-cols-10 gap-2">
                {selectedHw.problems.map(p => (
                  <div key={p} className={`text-center rounded-lg p-2 ${getColor(errorRates[p])}`}>
                    <div className="text-xs text-gray-600">{p}번</div>
                    <div className="font-bold text-sm">{errorRates[p] !== null ? errorRates[p] + '%' : '-'}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}

      {homeworks.length === 0 && (
        <div className="bg-white rounded-xl shadow p-8 text-center text-gray-400">등록된 과제가 없습니다.</div>
      )}
    </div>
  );
}

// ── 학생 뷰 ──
function StudentView({ user, onLogout, onUserUpdate }) {
  const [homeworks, setHomeworks] = useState([]);
  const [mySubmissions, setMySubmissions] = useState([]);
  const [selectedHw, setSelectedHw] = useState(null);
  const [showPwModal, setShowPwModal] = useState(false);

  const load = async () => {
    const [hw, subs] = await Promise.all([
      DB.getHomeworks(user.class_id),
      DB.getStudentSubmissions(user.id),
    ]);
    setHomeworks(hw);
    setMySubmissions(subs);
  };
  useEffect(() => { load(); }, []);

  const submittedHwIds = new Set(mySubmissions.map(s => s.homework_id));

  return (
    <div className="max-w-2xl mx-auto p-4">
      <Header title={`${user.name}`} onLogout={onLogout} onPasswordChange={() => setShowPwModal(true)} />
      {showPwModal && <PasswordModal role="student" user={user} onClose={() => setShowPwModal(false)} onChanged={pw => onUserUpdate({ ...user, password: pw })} />}

      {selectedHw ? (
        <OXSubmission homework={selectedHw} studentId={user.id} onBack={() => { setSelectedHw(null); load(); }} existingSubmission={mySubmissions.find(s => s.homework_id === selectedHw.id)} />
      ) : (
        <div className="bg-white rounded-xl shadow p-6">
          <h2 className="text-lg font-bold mb-4">과제 목록</h2>
          <div className="space-y-2">
            {homeworks.map(h => {
              const submitted = submittedHwIds.has(h.id);
              const sub = mySubmissions.find(s => s.homework_id === h.id);
              return (
                <button key={h.id} className="w-full text-left bg-gray-50 hover:bg-gray-100 rounded-lg p-4 flex items-center justify-between" onClick={() => setSelectedHw(h)}>
                  <div>
                    <span className="font-medium">{h.title}</span>
                    <span className="text-gray-500 text-sm ml-2">({h.problems.length}문제)</span>
                  </div>
                  <div>
                    {submitted ? (
                      <span className="bg-green-100 text-green-700 text-sm px-3 py-1 rounded-full">{sub.correct_count}O / {sub.wrong_count}X 제출완료</span>
                    ) : (
                      <span className="bg-gray-200 text-gray-600 text-sm px-3 py-1 rounded-full">미제출</span>
                    )}
                  </div>
                </button>
              );
            })}
            {homeworks.length === 0 && <p className="text-gray-400 text-center py-8">등록된 과제가 없습니다.</p>}
          </div>
        </div>
      )}
    </div>
  );
}

// ── O/X 입력 ──
function OXSubmission({ homework, studentId, onBack, existingSubmission }) {
  const [results, setResults] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);

  useEffect(() => {
    if (existingSubmission?.results) {
      setResults(existingSubmission.results);
      setSubmitted(true);
    }
  }, [existingSubmission]);

  const toggle = (num) => {
    setResults(prev => {
      const cur = prev[String(num)];
      const next = { ...prev };
      if (cur === 'O') next[String(num)] = 'X';
      else if (cur === 'X') delete next[String(num)];
      else next[String(num)] = 'O';
      return next;
    });
    setSubmitted(false);
  };

  const allMarked = homework.problems.every(p => results[String(p)] !== undefined);
  const correctCount = homework.problems.filter(p => results[String(p)] === 'O').length;
  const wrongCount = homework.problems.filter(p => results[String(p)] === 'X').length;

  const handleSubmit = async () => {
    if (!allMarked) { alert('모든 문제에 O 또는 X를 표시하세요.'); return; }
    setSubmitting(true);
    const payload = {
      student_id: studentId,
      homework_id: homework.id,
      results,
      correct_count: correctCount,
      wrong_count: wrongCount,
      submitted_at: new Date().toISOString(),
    };
    if (existingSubmission) {
      await sb.from('omr_submissions').update(payload).eq('id', existingSubmission.id);
    } else {
      await sb.from('omr_submissions').upsert(payload, { onConflict: 'student_id,homework_id' });
    }
    setSubmitting(false);
    setSubmitted(true);
  };

  return (
    <div className="bg-white rounded-xl shadow p-6">
      <div className="flex items-center justify-between mb-4">
        <button className="text-blue-600 hover:underline" onClick={onBack}>&larr; 목록으로</button>
        <h2 className="font-bold text-lg">{homework.title}</h2>
        <div className="text-sm text-gray-500">{homework.problems.length}문제</div>
      </div>

      {submitted && (
        <div className="bg-green-50 border border-green-200 rounded-lg p-3 mb-4 text-center">
          <p className="text-green-800 font-medium">제출 완료! {correctCount}O / {wrongCount}X</p>
          <p className="text-green-600 text-sm mt-1">아래에서 수정 후 다시 제출할 수 있습니다.</p>
        </div>
      )}

      <div className="grid grid-cols-5 sm:grid-cols-6 md:grid-cols-8 gap-2 mb-6">
        {homework.problems.map(p => {
          const val = results[String(p)];
          return (
            <button key={p} className={`ox-btn rounded-lg p-3 text-center border-2 ${val === 'O' ? 'border-blue-500 bg-blue-50' : val === 'X' ? 'border-red-500 bg-red-50' : 'border-gray-200 bg-gray-50 hover:border-gray-300'}`} onClick={() => toggle(p)}>
              <div className="text-xs text-gray-500 mb-1">{p}번</div>
              <div className={`text-xl font-bold ${val === 'O' ? 'text-blue-600' : val === 'X' ? 'text-red-600' : 'text-gray-300'}`}>
                {val || '-'}
              </div>
            </button>
          );
        })}
      </div>

      <div className="flex items-center justify-between">
        <div className="text-sm text-gray-600">
          <span className="text-blue-600 font-medium">{correctCount}O</span> / <span className="text-red-600 font-medium">{wrongCount}X</span> / <span className="text-gray-400">{homework.problems.length - correctCount - wrongCount}미표시</span>
        </div>
        <button className={`px-6 py-3 rounded-lg font-semibold ${allMarked ? 'bg-blue-600 text-white hover:bg-blue-700' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`} onClick={handleSubmit} disabled={!allMarked || submitting}>
          {submitting ? '제출 중...' : submitted ? '다시 제출' : '제출'}
        </button>
      </div>
    </div>
  );
}

// ── 공통 헤더 ──
function Header({ title, onLogout, onPasswordChange }) {
  return (
    <div className="flex items-center justify-between mb-4">
      <div className="flex items-center gap-3">
        <img src="./logo.png" alt="" className="w-8 h-8 rounded" onError={e => e.target.style.display='none'} />
        <h1 className="text-xl font-bold text-gray-800">{title}</h1>
      </div>
      <div className="flex gap-2">
        {onPasswordChange && <button className="text-sm text-gray-600 hover:underline" onClick={onPasswordChange}>비밀번호 변경</button>}
        <button className="text-sm text-red-600 hover:underline" onClick={onLogout}>로그아웃</button>
      </div>
    </div>
  );
}

// ── 메인 앱 ──
function App() {
  const [session, setSession] = useState(null);

  const handleLogin = (s) => setSession(s);
  const handleLogout = () => setSession(null);
  const handleUserUpdate = (updatedUser) => setSession(prev => ({ ...prev, user: updatedUser }));

  if (!session) return <LoginView onLogin={handleLogin} />;
  if (session.role === 'admin') return <AdminView onLogout={handleLogout} />;
  if (session.role === 'teacher') return <TeacherView user={session.user} onLogout={handleLogout} onUserUpdate={handleUserUpdate} />;
  if (session.role === 'student') return <StudentView user={session.user} onLogout={handleLogout} onUserUpdate={handleUserUpdate} />;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
