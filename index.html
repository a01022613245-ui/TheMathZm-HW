function parseProblems(input) {
  const parts = input.split(',').map(s => s.trim()).filter(Boolean);
  const nums = [];
  for (const p of parts) {
    const rangeMatch = p.match(/^(\d+)\s*[~\-]\s*(\d+)$/);
    if (rangeMatch) {
      const start = parseInt(rangeMatch[1]);
      const end = parseInt(rangeMatch[2]);
      for (let i = Math.min(start, end); i <= Math.max(start, end); i++) nums.push(i);
    } else if (/^\d+$/.test(p)) {
      nums.push(parseInt(p));
    }
  }
  return [...new Set(nums)].sort((a, b) => a - b);
}

async function makeLoginId(prefix, name, table) {
  const base = prefix + name;
  const { data } = await sb.from(table).select('login_id').like('login_id', base + '%');
  if (!data || data.length === 0) return base;
  const existing = new Set(data.map(r => r.login_id));
  if (!existing.has(base)) return base;
  let i = 2;
  while (existing.has(base + i)) i++;
  return base + i;
}

const DAY_NAMES = ['일','월','화','수','목','금','토'];

function formatHomeworkDate(date) {
  const m = date.getMonth() + 1;
  const d = date.getDate();
  const day = DAY_NAMES[date.getDay()];
  return `${m}/${d} ${day}`;
}

// ── CRUD ──
const DB = {
  async getTeachers() { const { data } = await sb.from('omr_teachers').select('*').order('created_at'); return data || []; },
  async getClasses(teacherId) {
    let q = sb.from('omr_classes').select('*').order('created_at');
    if (teacherId) q = q.eq('teacher_id', teacherId);
    const { data } = await q; return data || [];
  },
  async getStudents(classId) {
    let q = sb.from('omr_students').select('*').order('created_at');
    if (classId) q = q.eq('class_id', classId);
    const { data } = await q; return data || [];
  },
  async getAllStudents(teacherId) {
    const classes = await DB.getClasses(teacherId);
    if (classes.length === 0) return [];
    const classIds = classes.map(c => c.id);
    const { data } = await sb.from('omr_students').select('*').in('class_id', classIds).order('created_at');
    return data || [];
  },
  async getHomeworks(classId) {
    let q = sb.from('omr_homeworks').select('*').order('created_at', { ascending: false });
    if (classId) q = q.eq('class_id', classId);
    const { data } = await q; return data || [];
  },
  async getHomeworksWithSections(classId) {
    const homeworks = await DB.getHomeworks(classId);
    if (homeworks.length === 0) return [];
    const hwIds = homeworks.map(h => h.id);
    const { data: sections } = await sb.from('omr_homework_sections').select('*, omr_textbooks(name)').in('homework_id', hwIds).order('sort_order');
    return homeworks.map(h => ({
      ...h,
      sections: (sections || []).filter(s => s.homework_id === h.id)
    }));
  },
  async getSubmissions(homeworkId) {
    let q = sb.from('omr_submissions').select('*');
    if (homeworkId) q = q.eq('homework_id', homeworkId);
    const { data } = await q; return data || [];
  },
  async getSubmission(studentId, homeworkId) {
    const { data } = await sb.from('omr_submissions').select('*').eq('student_id', studentId).eq('homework_id', homeworkId).maybeSingle();
    return data;
  },
  async getStudentSubmissions(studentId) {
    const { data } = await sb.from('omr_submissions').select('*').eq('student_id', studentId);
    return data || [];
  },
  async getTextbooks(classId) {
    const { data } = await sb.from('omr_textbooks').select('*').eq('class_id', classId).order('created_at');
    return data || [];
  },
};

// 과제의 전체 문제 수 계산 (섹션 기반 or 레거시)
function getTotalProblems(hw) {
  if (hw.sections && hw.sections.length > 0) {
    return hw.sections.reduce((sum, s) => sum + s.problems.length, 0);
  }
  return (hw.problems || []).length;
}

// ── 로그인 화면 ──
function LoginView({ onLogin }) {
  const [loginId, setLoginId] = useState(() => localStorage.getItem('omr_saved_id') || '');
  const [password, setPassword] = useState('');
  const [rememberMe, setRememberMe] = useState(() => !!localStorage.getItem('omr_saved_id'));
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleLogin = async () => {
    setError('');
    if (!loginId || !password) { setError('ID와 비밀번호를 입력하세요.'); return; }
    if (rememberMe) localStorage.setItem('omr_saved_id', loginId);
    else localStorage.removeItem('omr_saved_id');
    setLoading(true);
    const { data: teacher } = await sb.from('omr_teachers').select('*').eq('login_id', loginId).eq('password', password).maybeSingle();
    if (teacher) { setLoading(false); onLogin({ role: 'teacher', user: teacher }); return; }
    const { data: student } = await sb.from('omr_students').select('*').eq('login_id', loginId).eq('password', password).maybeSingle();
    if (student) { setLoading(false); onLogin({ role: 'student', user: student }); return; }
    setLoading(false);
    setError('ID 또는 비밀번호가 올바르지 않습니다.');
  };

  return (
    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100">
      <div className="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
        <div className="text-center mb-6">
          <img src="./logo.png" alt="더맺음 수학학원" className="h-16 mx-auto mb-2 object-contain" onError={e => e.target.style.display='none'} />
          <p className="text-gray-500 text-sm mt-1">온라인 숙제 시스템</p>
        </div>
        <div className="space-y-4">
          <input className="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-400 outline-none" placeholder="아이디 (예: TMZ홍길동)" value={loginId} onChange={e => setLoginId(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleLogin()} />
          <input className="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-400 outline-none" type="password" placeholder="비밀번호 (4자리)" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleLogin()} />
          <label className="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" className="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500" checked={rememberMe} onChange={e => setRememberMe(e.target.checked)} />
            <span className="text-sm text-gray-600">아이디 기억하기</span>
          </label>
          {error && <p className="text-red-500 text-sm">{error}</p>}
          <button className="w-full bg-blue-600 text-white rounded-lg py-3 font-semibold hover:bg-blue-700 disabled:opacity-50" onClick={handleLogin} disabled={loading}>
            {loading ? '로그인 중...' : '로그인'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── 비밀번호 변경 모달 ──
function PasswordModal({ role, user, onClose, onChanged }) {
  const [current, setCurrent] = useState('');
  const [newPw, setNewPw] = useState('');
  const [confirm, setConfirm] = useState('');
  const [error, setError] = useState('');

  const handleChange = async () => {
    if (current !== user.password) { setError('현재 비밀번호가 틀립니다.'); return; }
    if (!/^\d{4}$/.test(newPw)) { setError('새 비밀번호는 4자리 숫자여야 합니다.'); return; }
    if (newPw !== confirm) { setError('새 비밀번호가 일치하지 않습니다.'); return; }
    const table = role === 'teacher' ? 'omr_teachers' : 'omr_students';
    await sb.from(table).update({ password: newPw }).eq('id', user.id);
    onChanged(newPw);
    onClose();
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50" onClick={onClose}>
      <div className="bg-white rounded-xl p-6 w-full max-w-sm" onClick={e => e.stopPropagation()}>
        <h3 className="text-lg font-bold mb-4">비밀번호 변경</h3>
        <div className="space-y-3">
          <input className="w-full border rounded-lg px-3 py-2" type="password" placeholder="현재 비밀번호" value={current} onChange={e => setCurrent(e.target.value)} />
          <input className="w-full border rounded-lg px-3 py-2" type="password" placeholder="새 비밀번호 (4자리 숫자)" value={newPw} onChange={e => setNewPw(e.target.value)} />
          <input className="w-full border rounded-lg px-3 py-2" type="password" placeholder="새 비밀번호 확인" value={confirm} onChange={e => setConfirm(e.target.value)} />
          {error && <p className="text-red-500 text-sm">{error}</p>}
        </div>
        <div className="flex gap-2 mt-4">
          <button className="flex-1 bg-gray-200 rounded-lg py-2" onClick={onClose}>취소</button>
          <button className="flex-1 bg-blue-600 text-white rounded-lg py-2" onClick={handleChange}>변경</button>
        </div>
      </div>
    </div>
  );
}

// ── 학생 상세 모달 (Chart.js) ──
function StudentDetailModal({ student, classes, onClose }) {
  const [submissions, setSubmissions] = useState([]);
  const [homeworks, setHomeworks] = useState([]);
  const [loading, setLoading] = useState(true);
  const chartRef = useRef(null);
  const chartInstance = useRef(null);

  useEffect(() => {
    const load = async () => {
      setLoading(true);
      const subs = await DB.getStudentSubmissions(student.id);
      const hws = await DB.getHomeworksWithSections(student.class_id);
      setSubmissions(subs);
      setHomeworks(hws);
      setLoading(false);
    };
    load();
  }, [student.id]);

  useEffect(() => {
    if (loading || !chartRef.current) return;
    if (chartInstance.current) chartInstance.current.destroy();

    const submittedHws = homeworks.filter(hw => submissions.some(s => s.homework_id === hw.id));
    const labels = submittedHws.map(hw => hw.title);
    const rates = submittedHws.map(hw => {
      const sub = submissions.find(s => s.homework_id === hw.id);
      if (!sub) return 0;
      const total = sub.correct_count + sub.wrong_count;
      return total > 0 ? Math.round((sub.correct_count / total) * 100) : 0;
    });

    chartInstance.current = new Chart(chartRef.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: '정답률 (%)',
          data: rates,
          backgroundColor: rates.map(r => r >= 80 ? 'rgba(59,130,246,0.6)' : r >= 50 ? 'rgba(234,179,8,0.6)' : 'rgba(239,68,68,0.6)'),
          borderRadius: 4,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: { y: { beginAtZero: true, max: 100, ticks: { callback: v => v + '%' } } },
        plugins: { legend: { display: false } },
      },
    });

    return () => { if (chartInstance.current) chartInstance.current.destroy(); };
  }, [loading, submissions, homeworks]);

  const totalCorrect = submissions.reduce((sum, s) => sum + (s.correct_count || 0), 0);
  const totalWrong = submissions.reduce((sum, s) => sum + (s.wrong_count || 0), 0);
  const totalAll = totalCorrect + totalWrong;
  const overallRate = totalAll > 0 ? Math.round((totalCorrect / totalAll) * 100) : 0;
  const className = classes?.find(c => c.id === student.class_id)?.name || '';

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50" onClick={onClose}>
      <div className="bg-white rounded-xl p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <h3 className="text-lg font-bold">{student.name} 학생 상세</h3>
          <button className="text-gray-400 hover:text-gray-600 text-xl" onClick={onClose}>&times;</button>
        </div>

        <div className="text-sm text-gray-600 mb-4">
          {className && <span className="bg-blue-50 text-blue-700 px-2 py-1 rounded mr-2">{className}</span>}
          {student.school && <span>{student.school} {student.grade}</span>}
          <span className="ml-2 text-gray-400">({student.login_id})</span>
        </div>

        {loading ? (
          <p className="text-center text-gray-400 py-8">로딩 중...</p>
        ) : (
          <>
            <div className="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-lg p-4 mb-4 text-center">
              <p className="text-sm text-gray-600 mb-1">전체 정답률</p>
              <p className="text-3xl font-bold text-blue-600">{overallRate}%</p>
              <p className="text-sm text-gray-500 mt-1">{totalCorrect}O / {totalWrong}X (총 {submissions.length}개 과제 제출)</p>
            </div>

            {submissions.length > 0 && (
              <div className="mb-4" style={{ height: '200px' }}>
                <canvas ref={chartRef}></canvas>
              </div>
            )}

            <h4 className="font-bold text-sm mb-2">제출 이력</h4>
            <div className="space-y-2">
              {homeworks.map(hw => {
                const sub = submissions.find(s => s.homework_id === hw.id);
                const total = sub ? sub.correct_count + sub.wrong_count : 0;
                const rate = total > 0 ? Math.round((sub.correct_count / total) * 100) : null;
                return (
                  <div key={hw.id} className="flex items-center justify-between bg-gray-50 rounded-lg p-3">
                    <span className="text-sm font-medium">{hw.title}</span>
                    {sub ? (
                      <span className="text-sm">
                        <span className="text-blue-600 font-medium">{sub.correct_count}O</span> / <span className="text-red-600 font-medium">{sub.wrong_count}X</span>
                        <span className="ml-2 text-gray-500">({rate}%)</span>
                      </span>
                    ) : (
                      <span className="text-sm text-gray-400">미제출</span>
                    )}
                  </div>
                );
              })}
              {homeworks.length === 0 && <p className="text-gray-400 text-center py-4">등록된 과제가 없습니다.</p>}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── 미니 캘린더 ──
function MiniCalendar({ selectedDate, onSelect }) {
  const [viewDate, setViewDate] = useState(() => selectedDate || new Date());

  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const days = [];
  for (let i = 0; i < firstDay; i++) days.push(null);
  for (let i = 1; i <= daysInMonth; i++) days.push(i);

  const prevMonth = () => setViewDate(new Date(year, month - 1, 1));
  const nextMonth = () => setViewDate(new Date(year, month + 1, 1));

  const isSelected = (day) => {
    if (!selectedDate || !day) return false;
    return selectedDate.getFullYear() === year &&
           selectedDate.getMonth() === month &&
           selectedDate.getDate() === day;
  };

  const isToday = (day) => {
    if (!day) return false;
    const today = new Date();
    return today.getFullYear() === year && today.getMonth() === month && today.getDate() === day;
  };

  return (
    <div className="bg-gray-50 rounded-lg p-3">
      <div className="flex items-center justify-between mb-2">
        <button className="w-8 h-8 rounded-full hover:bg-gray-200 flex items-center justify-center text-gray-600" onClick={prevMonth}>&lsaquo;</button>
        <span className="font-medium text-sm">{year}년 {month + 1}월</span>
        <button className="w-8 h-8 rounded-full hover:bg-gray-200 flex items-center justify-center text-gray-600" onClick={nextMonth}>&rsaquo;</button>
      </div>
      <div className="grid grid-cols-7 gap-1 text-center">
        {DAY_NAMES.map((d, i) => (
          <div key={d} className={`text-xs py-1 ${i === 0 ? 'text-red-400' : i === 6 ? 'text-blue-400' : 'text-gray-400'}`}>{d}</div>
        ))}
        {days.map((day, i) => (
          <button
            key={i}
            className={`text-sm py-1.5 rounded-lg transition-colors
              ${!day ? '' : 'cursor-pointer hover:bg-blue-100'}
              ${isSelected(day) ? 'bg-blue-600 text-white font-bold' : ''}
              ${isToday(day) && !isSelected(day) ? 'bg-blue-50 text-blue-600 font-medium' : ''}
              ${!day ? 'invisible' : ''}
            `}
            onClick={() => day && onSelect(new Date(year, month, day))}
            disabled={!day}
          >
            {day || ''}
          </button>
        ))}
      </div>
    </div>
  );
}

// ── 과제 등록 모달 (캘린더 + 교재카드 + 단원) ──
function AddHomeworkModal({ textbooks, onAdd, onClose }) {
  const [selectedDate, setSelectedDate] = useState(null);
  // 교재별 카드 구조: [{ textbookId, chapters: [{ chapterName, rangeInput, problems }] }]
  const [cards, setCards] = useState([]);

  const addCard = () => {
    setCards([...cards, { textbookId: '', chapters: [{ chapterName: '', rangeInput: '', problems: [] }] }]);
  };

  const removeCard = (ci) => {
    setCards(cards.filter((_, i) => i !== ci));
  };

  const updateCardTextbook = (ci, value) => {
    const next = [...cards];
    next[ci] = { ...next[ci], textbookId: value };
    setCards(next);
  };

  const addChapter = (ci) => {
    const next = [...cards];
    next[ci] = { ...next[ci], chapters: [...next[ci].chapters, { chapterName: '', rangeInput: '', problems: [] }] };
    setCards(next);
  };

  const removeChapter = (ci, chi) => {
    const next = [...cards];
    next[ci] = { ...next[ci], chapters: next[ci].chapters.filter((_, i) => i !== chi) };
    if (next[ci].chapters.length === 0) {
      setCards(next.filter((_, i) => i !== ci));
    } else {
      setCards(next);
    }
  };

  const updateChapter = (ci, chi, field, value) => {
    const next = [...cards];
    const ch = { ...next[ci].chapters[chi], [field]: value };
    if (field === 'rangeInput') {
      ch.problems = parseProblems(value);
    }
    next[ci] = { ...next[ci], chapters: next[ci].chapters.map((c, i) => i === chi ? ch : c) };
    setCards(next);
  };

  // flat sections for onAdd (기존 구조 호환)
  const flatSections = cards.flatMap(card =>
    card.chapters.map(ch => ({ textbookId: card.textbookId, chapterName: ch.chapterName, problems: ch.problems }))
  );

  const totalProblems = flatSections.reduce((sum, s) => sum + s.problems.length, 0);

  // 이미 선택된 교재 ID 목록 (중복 선택 방지)
  const usedTextbookIds = new Set(cards.map(c => c.textbookId).filter(Boolean));

  const handleAdd = () => {
    if (!selectedDate) { alert('날짜를 선택하세요.'); return; }
    if (cards.length === 0) { alert('교재를 추가하세요.'); return; }
    for (let ci = 0; ci < cards.length; ci++) {
      const card = cards[ci];
      if (!card.textbookId) { alert(`교재 ${ci+1}: 교재를 선택하세요.`); return; }
      for (let chi = 0; chi < card.chapters.length; chi++) {
        const ch = card.chapters[chi];
        if (!ch.chapterName.trim()) { alert(`교재 ${ci+1} > 단원 ${chi+1}: 단원명을 입력하세요.`); return; }
        if (ch.problems.length === 0) { alert(`교재 ${ci+1} > 단원 ${chi+1}: 문제번호를 입력하세요.`); return; }
      }
    }
    const title = formatHomeworkDate(selectedDate);
    onAdd(title, selectedDate, flatSections);
    onClose();
  };

  return (
    <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50" onClick={onClose}>
      <div className="bg-white rounded-xl shadow-xl p-6 w-full max-w-lg max-h-[90vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
        <h3 className="text-lg font-bold mb-4">과제 등록</h3>

        {/* 캘린더 */}
        <MiniCalendar selectedDate={selectedDate} onSelect={setSelectedDate} />

        {selectedDate && (
          <div className="mt-2 mb-1 text-center">
            <span className="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-medium">
              {formatHomeworkDate(selectedDate)}
            </span>
          </div>
        )}

        {/* 교재 카드들 */}
        <div className="space-y-3 mt-4">
          {cards.map((card, ci) => {
            const tbName = textbooks.find(t => t.id === card.textbookId)?.name;
            return (
              <div key={ci} className="border-2 border-blue-200 rounded-xl bg-blue-50/30 overflow-hidden">
                {/* 교재 헤더 */}
                <div className="flex items-center justify-between bg-blue-50 px-3 py-2 border-b border-blue-200">
                  <select className="flex-1 bg-transparent text-sm font-medium text-blue-800 outline-none cursor-pointer" value={card.textbookId} onChange={e => updateCardTextbook(ci, e.target.value)}>
                    <option value="">교재 선택</option>
                    {textbooks.map(t => (
                      <option key={t.id} value={t.id} disabled={usedTextbookIds.has(t.id) && t.id !== card.textbookId}>{t.name}</option>
                    ))}
                  </select>
                  <button className="text-red-400 hover:text-red-600 font-bold px-2 ml-2 text-sm" onClick={() => removeCard(ci)}>✕</button>
                </div>

                {/* 단원들 */}
                <div className="p-3 space-y-2">
                  {card.chapters.map((ch, chi) => (
                    <div key={chi} className="bg-white border border-gray-200 rounded-lg p-2.5 space-y-1.5">
                      <div className="flex items-center justify-between">
                        <span className="text-xs font-medium text-gray-500">단원 {chi + 1}</span>
                        {card.chapters.length > 1 && (
                          <button className="text-red-400 hover:text-red-600 text-xs" onClick={() => removeChapter(ci, chi)}>삭제</button>
                        )}
                      </div>
                      <input className="w-full border rounded px-2.5 py-1.5 text-sm" placeholder="단원명 (예: 1단원 지수와 로그)" value={ch.chapterName} onChange={e => updateChapter(ci, chi, 'chapterName', e.target.value)} />
                      <input className="w-full border rounded px-2.5 py-1.5 text-sm" placeholder="문제번호 (예: 1~15, 20)" value={ch.rangeInput} onChange={e => updateChapter(ci, chi, 'rangeInput', e.target.value)} />
                      {ch.problems.length > 0 && (
                        <div className="bg-blue-50 rounded p-1.5 text-xs text-blue-700">
                          {ch.problems.length}문제: {ch.problems.join(', ')}
                        </div>
                      )}
                    </div>
                  ))}
                  <button className="w-full border border-dashed border-gray-300 rounded-lg py-1.5 text-gray-400 hover:border-blue-400 hover:text-blue-500 text-xs" onClick={() => addChapter(ci)}>
                    + 단원 추가
                  </button>
                </div>
              </div>
            );
          })}
        </div>

        <button className="w-full mt-3 border-2 border-dashed border-blue-300 rounded-xl py-2.5 text-blue-500 hover:border-blue-500 hover:bg-blue-50 text-sm font-medium" onClick={addCard}>
          + 교재 추가
        </button>

        {totalProblems > 0 && (
          <div className="mt-3 text-center text-sm text-gray-600">
            총 <span className="font-bold text-blue-600">{totalProblems}</span>문제
          </div>
        )}

        <div className="flex gap-2 justify-end mt-4">
          <button className="px-4 py-2 rounded-lg border text-gray-600 hover:bg-gray-50" onClick={onClose}>취소</button>
          <button className="px-4 py-2 rounded-lg bg-blue-600 text-white" onClick={handleAdd}>등록</button>
        </div>
      </div>
    </div>
  );
}

// ── 반 관리 ──
function ClassManager({ classes, teacherId, onReload }) {
  const [showAddModal, setShowAddModal] = useState(false);
  const [selectedClass, setSelectedClass] = useState(null);
  const [classStudents, setClassStudents] = useState([]);
  const [allStudents, setAllStudents] = useState([]);
  const [addStudentId, setAddStudentId] = useState('');
  const [studentCounts, setStudentCounts] = useState({});
  // 교재 관련
  const [textbooks, setTextbooks] = useState([]);
  const [showAddTextbookModal, setShowAddTextbookModal] = useState(false);

  const loadClassStudents = async (classId) => {
    if (!classId) { setClassStudents([]); return; }
    setClassStudents(await DB.getStudents(classId));
  };

  const loadAllStudents = async () => {
    const all = await DB.getAllStudents(teacherId);
    setAllStudents(all);
    const counts = {};
    for (const s of all) {
      counts[s.class_id] = (counts[s.class_id] || 0) + 1;
    }
    setStudentCounts(counts);
  };

  const loadTextbooks = async (classId) => {
    if (!classId) { setTextbooks([]); return; }
    setTextbooks(await DB.getTextbooks(classId));
  };

  useEffect(() => { loadAllStudents(); }, []);
  useEffect(() => {
    if (selectedClass) {
      loadClassStudents(selectedClass.id);
      loadTextbooks(selectedClass.id);
    }
  }, [selectedClass]);

  const addClass = async (name) => {
    const { data } = await sb.from('omr_classes').insert({ name, teacher_id: teacherId }).select().single();
    await onReload();
    if (data) setSelectedClass(data);
  };

  const deleteClass = async (c, e) => {
    e.stopPropagation();
    if (!confirm(`"${c.name}" 반을 삭제하시겠습니까? 소속 학생과 과제가 모두 삭제됩니다.`)) return;
    await sb.from('omr_classes').delete().eq('id', c.id);
    if (selectedClass?.id === c.id) setSelectedClass(null);
    onReload();
    loadAllStudents();
  };

  const assignStudent = async () => {
    if (!addStudentId || !selectedClass) return;
    await sb.from('omr_students').update({ class_id: selectedClass.id }).eq('id', addStudentId);
    setAddStudentId('');
    loadClassStudents(selectedClass.id);
    loadAllStudents();
  };

  const removeFromClass = async (student) => {
    if (!confirm(`${student.name}을(를) 이 반에서 제거하시겠습니까?`)) return;
    await sb.from('omr_students').delete().eq('id', student.id);
    loadClassStudents(selectedClass.id);
    loadAllStudents();
  };

  const addTextbook = async (name) => {
    await sb.from('omr_textbooks').insert({ name, class_id: selectedClass.id });
    loadTextbooks(selectedClass.id);
  };

  const deleteTextbook = async (t) => {
    if (!confirm(`"${t.name}" 교재를 삭제하시겠습니까? 이 교재를 사용한 과제의 단원 정보도 삭제됩니다.`)) return;
    await sb.from('omr_textbooks').delete().eq('id', t.id);
    loadTextbooks(selectedClass.id);
  };

  const availableStudents = selectedClass
    ? allStudents.filter(s => s.class_id !== selectedClass.id)
    : [];

  return (
    <div className="space-y-4">
      <div className="bg-white rounded-xl shadow p-6">
        <div className="flex items-center justify-between mb-4">
          <h2 className="text-lg font-bold">반 관리</h2>
          <button className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm" onClick={() => setShowAddModal(true)}>반 추가</button>
        </div>
        <div className="space-y-2">
          {classes.map(c => (
            <div key={c.id} className={`flex items-center justify-between rounded-lg p-3 cursor-pointer border-2 ${selectedClass?.id === c.id ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:border-gray-100 bg-gray-50'}`} onClick={() => setSelectedClass(c)}>
              <div className="flex items-center gap-3">
                <span className="font-medium">{c.name}</span>
                <span className="text-sm text-gray-500">학생 {studentCounts[c.id] || 0}명</span>
              </div>
              <button className="text-red-500 hover:text-red-700 font-bold px-2" title="삭제" onClick={e => deleteClass(c, e)}>✕</button>
            </div>
          ))}
          {classes.length === 0 && <p className="text-gray-400 text-center py-4">반을 추가해주세요.</p>}
        </div>
      </div>

      {selectedClass && (
        <div className="bg-white rounded-xl shadow p-6">
          <h3 className="font-bold mb-3">{selectedClass.name} - 소속 학생</h3>

          {availableStudents.length > 0 && (
            <div className="flex gap-2 mb-4">
              <select className="flex-1 border rounded-lg px-3 py-2" value={addStudentId} onChange={e => setAddStudentId(e.target.value)}>
                <option value="">학생 선택하여 배정...</option>
                {availableStudents.map(s => (
                  <option key={s.id} value={s.id}>{s.name} ({s.login_id})</option>
                ))}
              </select>
              <button className="bg-green-600 text-white px-4 rounded-lg" onClick={assignStudent}>배정</button>
            </div>
          )}

          <div className="space-y-2">
            {classStudents.map(s => (
              <div key={s.id} className="flex items-center justify-between bg-gray-50 rounded-lg p-3">
                <div>
                  <span className="font-medium">{s.name}</span>
                  <span className="text-gray-500 text-sm ml-2">({s.login_id})</span>
                  {s.school && <span className="text-gray-400 text-sm ml-2">{s.school} {s.grade}</span>}
                </div>
                <button className="text-sm text-red-600 hover:underline" onClick={() => removeFromClass(s)}>제거</button>
              </div>
            ))}
            {classStudents.length === 0 && <p className="text-gray-400 text-center py-4">소속 학생이 없습니다.</p>}
          </div>
        </div>
      )}

      {/* 반교재 관리 */}
      {selectedClass && (
        <div className="bg-white rounded-xl shadow p-6">
          <div className="flex items-center justify-between mb-3">
            <h3 className="font-bold">{selectedClass.name} - 반교재</h3>
            <button className="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-sm" onClick={() => setShowAddTextbookModal(true)}>교재 추가</button>
          </div>
          <div className="space-y-2">
            {textbooks.map(t => (
              <div key={t.id} className="flex items-center justify-between bg-gray-50 rounded-lg p-3">
                <span className="font-medium">{t.name}</span>
                <button className="text-red-500 hover:text-red-700 font-bold px-2" title="삭제" onClick={() => deleteTextbook(t)}>✕</button>
              </div>
            ))}
            {textbooks.length === 0 && <p className="text-gray-400 text-center py-4">등록된 교재가 없습니다.</p>}
          </div>
        </div>
      )}

      {showAddModal && <AddClassModal onAdd={addClass} onClose={() => setShowAddModal(false)} />}
      {showAddTextbookModal && <AddTextbookModal onAdd={addTextbook} onClose={() => setShowAddTextbookModal(false)} />}
    </div>
  );
}

function AddStudentModal({ classes, onAdd, onClose }) {

  const [classId, setClassId] = useState('');

            <input className="w-full border rounded-lg px-3 py-2" placeholder="학년" value={grade} onChange={e => setGrade(e.target.value)} />
            <select className="w-full border rounded-lg px-3 py-2" value={classId} onChange={e => setClassId(e.target.value)}>
              <option value="">반 선택</option>
              {classes.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
            <div className="flex gap-2 justify-end pt-2">
              <button className="px-4 py-2 rounded-lg border text-gray-600 hover:bg-gray-50" onClick={onClose}>취소</button>
              <button className="px-4 py-2 rounded-lg bg-blue-600 text-white disabled:opacity-50" onClick={handleAdd} disabled={loading}>{loading ? '추가 중...' : '추가'}</button>
            </div>

          <div className="space-y-3">
            <div className="bg-green-50 border border-green-200 rounded-lg p-4 text-sm">

              <p>아이디: <span className="font-mono font-bold">{result.loginId}</span></p>

            </div>
            <div className="flex justify-end">
              <button className="px-4 py-2 rounded-lg bg-blue-600 text-white" onClick={onClose}>닫기</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function StudentManager({ classes, teacherId, onReloadClasses }) {

        {filtered.length === 0 && <p className="text-gray-400 text-center py-4">
          {students.length === 0 ? '등록된 학생이 없습니다.' : '검색 결과가 없습니다.'}
        </p>}
      </div>

      {detailStudent && <StudentDetailModal student={detailStudent} classes={classes} onClose={() => setDetailStudent(null)} />}
      {showAddModal && <AddStudentModal classes={classes} onAdd={() => { load(); }} onClose={() => setShowAddModal(false)} />}
    </div>
  );
}

// ── 과제 관리 (+ 제출현황 통합) ──
function HomeworkManager({ classes, teacherId }) {
  const [selectedClass, setSelectedClass] = useState(null);
  const [homeworks, setHomeworks] = useState([]);
  const [textbooks, setTextbooks] = useState([]);
  const [showAddHwModal, setShowAddHwModal] = useState(false);
  const [expandedHw, setExpandedHw] = useState(null);
  const [submissions, setSubmissions] = useState([]);
  const [students, setStudents] = useState([]);
  const [detailStudent, setDetailStudent] = useState(null);

  const loadHomeworks = async () => {
    if (!selectedClass) { setHomeworks([]); return; }
    const [hw, st] = await Promise.all([
      DB.getHomeworksWithSections(selectedClass.id),
      DB.getStudents(selectedClass.id),
    ]);
    setHomeworks(hw);
    setStudents(st);
  };

  const loadTextbooks = async () => {
    if (!selectedClass) { setTextbooks([]); return; }
    setTextbooks(await DB.getTextbooks(selectedClass.id));
  };

  useEffect(() => {
    if (selectedClass) {
      loadHomeworks();
      loadTextbooks();
      setExpandedHw(null);
      setDetailStudent(null);
    }
  }, [selectedClass]);

  const loadSubmissions = async (hwId) => {
    setSubmissions(await DB.getSubmissions(hwId));
  };

  const toggleExpand = (hw) => {
    setExpandedHw(hw);
    setDetailStudent(null);
    loadSubmissions(hw.id);
  };

  const createHomework = async (title, homeworkDate, sections) => {
    if (!selectedClass) return;
    const { data: hw } = await sb.from('omr_homeworks').insert({
      title,
      class_id: selectedClass.id,
      problems: [],
      homework_date: homeworkDate.toISOString().split('T')[0],
    }).select().single();

    if (hw) {
      const sectionInserts = sections.map((s, i) => ({
        homework_id: hw.id,
        textbook_id: s.textbookId,
        chapter_name: s.chapterName.trim(),
        problems: s.problems,
        sort_order: i,
      }));
      await sb.from('omr_homework_sections').insert(sectionInserts);
    }
    loadHomeworks();
  };

  const deleteHomework = async (h, e) => {
    e.stopPropagation();
    if (!confirm(`"${h.title}" 과제를 삭제하시겠습니까?`)) return;
    await sb.from('omr_homeworks').delete().eq('id', h.id);
    if (expandedHw?.id === h.id) { setExpandedHw(null); setSubmissions([]); }
    loadHomeworks();
  };

  const submittedIds = new Set(submissions.map(s => s.student_id));
  const submittedStudents = students.filter(s => submittedIds.has(s.id));
  const unsubmittedStudents = students.filter(s => !submittedIds.has(s.id));

  const getStudentSubmission = (studentId) => submissions.find(s => s.student_id === studentId);

  // 섹션 기반 오답률
  const errorRatesBySection = useMemo(() => {
    if (!expandedHw || submissions.length === 0) return {};
    const sections = expandedHw.sections || [];
    const hasSections = sections.length > 0;

    if (hasSections) {
      const rates = {};
      for (const section of sections) {
        rates[section.id] = {};
        for (const p of section.problems) {
          let wrong = 0, total = 0;
          for (const sub of submissions) {
            const sectionResults = sub.results?.[section.id];
            if (sectionResults && sectionResults[String(p)] !== undefined) {
              total++;
              if (sectionResults[String(p)] === 'X') wrong++;
            }
          }
          rates[section.id][p] = total > 0 ? Math.round((wrong / total) * 100) : null;
        }
      }
      return rates;
    } else {
      // 레거시: flat problems
      const rates = { _legacy: {} };
      for (const p of (expandedHw.problems || [])) {
        let wrong = 0, total = 0;
        for (const sub of submissions) {
          if (sub.results && sub.results[String(p)] !== undefined) {
            total++;
            if (sub.results[String(p)] === 'X') wrong++;
          }
        }
        rates._legacy[p] = total > 0 ? Math.round((wrong / total) * 100) : null;
      }
      return rates;
    }
  }, [expandedHw, submissions]);

  const getColor = (rate) => {
    if (rate === null) return 'bg-gray-100';
    if (rate === 0) return 'bg-blue-100';
    if (rate <= 25) return 'bg-green-100';
    if (rate <= 50) return 'bg-yellow-100';
    if (rate <= 75) return 'bg-orange-100';
    return 'bg-red-100';
  };

  const getTextbookName = (textbookId) => {
    const found = textbooks.find(t => t.id === textbookId);
    return found?.name || '';
  };

  // 반 리스트 화면
  if (!selectedClass) {
    return (
      <div className="bg-white rounded-xl shadow p-6">
        <h2 className="text-lg font-bold mb-4">과제 관리</h2>
        <div className="space-y-2">
          {classes.map(c => (
            <div key={c.id} className="flex items-center justify-between bg-gray-50 hover:bg-gray-100 rounded-lg p-4 cursor-pointer" onClick={() => setSelectedClass(c)}>
              <span className="font-medium">{c.name}</span>
              <span className="text-gray-400 text-sm">&rsaquo;</span>
            </div>
          ))}
          {classes.length === 0 && <p className="text-gray-400 text-center py-4">반을 먼저 생성해주세요.</p>}
        </div>
      </div>
    );
  }

  // 과제 설정 화면 (반 선택됨)
  return (
    <div className="space-y-4">
      <div className="bg-white rounded-xl shadow p-6">
        <div className="flex items-center justify-between mb-4">
          <div className="flex items-center gap-3">
            <button className="text-blue-600 hover:underline text-sm" onClick={() => { setSelectedClass(null); setExpandedHw(null); setDetailStudent(null); }}>&larr; 반 목록</button>
            <h2 className="text-lg font-bold">{selectedClass.name} 과제 관리</h2>
          </div>
          <button className="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm" onClick={() => setShowAddHwModal(true)}>과제 등록</button>
        </div>

        {/* 과제 목록 */}
        <div className="space-y-2">
          {homeworks.map(h => {
            const totalP = getTotalProblems(h);
            const sectionSummary = (h.sections || []).map(s => {
              const tbName = s.omr_textbooks?.name || getTextbookName(s.textbook_id);
              return `${tbName} - ${s.chapter_name}`;
            }).join(', ');
            return (
              <div key={h.id} className="rounded-lg p-3 cursor-pointer border-2 border-gray-200 bg-gray-50 hover:border-gray-300" onClick={() => toggleExpand(h)}>
                <div className="flex items-center justify-between">
                  <div>
                    <span className="font-medium">{h.title}</span>
                    <span className="text-gray-500 text-sm ml-2">({totalP}문제)</span>
                  </div>
                  <button className="text-red-500 hover:text-red-700 font-bold px-2" onClick={e => deleteHomework(h, e)}>✕</button>
                </div>
                {sectionSummary && (
                  <div className="text-xs text-gray-400 mt-1 truncate">{sectionSummary}</div>
                )}
              </div>
            );
          })}
          {homeworks.length === 0 && <p className="text-gray-400 text-center py-4">등록된 과제가 없습니다.</p>}
        </div>
      </div>

      {/* 제출현황 모달 */}
      {expandedHw && (
        <div className="fixed inset-0 bg-black/40 flex items-center justify-center z-50" onClick={() => { setExpandedHw(null); setSubmissions([]); setDetailStudent(null); }}>
          <div className="bg-white rounded-xl shadow-xl p-6 w-full max-w-2xl max-h-[80vh] overflow-y-auto" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-4">
              <h3 className="text-lg font-bold">{expandedHw.title} - 제출현황</h3>
              <button className="text-gray-400 hover:text-gray-600 font-bold text-xl px-2" onClick={() => { setExpandedHw(null); setSubmissions([]); setDetailStudent(null); }}>✕</button>
            </div>

            <div className="space-y-4">
              {/* 제출 요약 */}
              <div className="bg-gray-50 border rounded-lg p-4">
                <div className="flex items-center gap-4 mb-3">
                  <span className="text-sm bg-blue-100 text-blue-800 px-2 py-1 rounded">{submittedStudents.length}/{students.length}명 제출</span>
                  <button className="text-sm text-blue-600 hover:underline ml-auto" onClick={() => loadSubmissions(expandedHw.id)}>새로고침</button>
                </div>

                <div className="mb-3">
                  <p className="text-sm font-medium text-green-700 mb-1">제출 완료 ({submittedStudents.length}명)</p>
                  <div className="flex flex-wrap gap-2">
                    {submittedStudents.map(s => {
                      const sub = getStudentSubmission(s.id);
                      return (
                        <button key={s.id} className="bg-green-50 border border-green-200 rounded-lg px-3 py-1.5 text-sm hover:bg-green-100" onClick={() => setDetailStudent(detailStudent?.id === s.id ? null : s)}>
                          {s.name} <span className="text-green-600">({sub?.correct_count}O/{sub?.wrong_count}X)</span>
                        </button>
                      );
                    })}
                    {submittedStudents.length === 0 && <span className="text-gray-400 text-sm">아직 제출한 학생이 없습니다.</span>}
                  </div>
                </div>

                {unsubmittedStudents.length > 0 && (
                  <div>
                    <p className="text-sm font-medium text-red-700 mb-1">미제출 ({unsubmittedStudents.length}명)</p>
                    <div className="flex flex-wrap gap-2">
                      {unsubmittedStudents.map(s => (
                        <span key={s.id} className="bg-red-50 border border-red-200 rounded-lg px-3 py-1.5 text-sm">{s.name}</span>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              {/* 학생 상세 결과 */}
              {detailStudent && getStudentSubmission(detailStudent.id) && (() => {
                const sub = getStudentSubmission(detailStudent.id);
                const sections = expandedHw.sections || [];
                const hasSections = sections.length > 0;

                return (
                  <div className="bg-gray-50 border rounded-lg p-4">
                    <h4 className="font-bold mb-3">{detailStudent.name} 상세 결과</h4>
                    {hasSections ? (
                      sections.map(section => {
                        const tbName = section.omr_textbooks?.name || getTextbookName(section.textbook_id);
                        return (
                          <div key={section.id} className="mb-4">
                            <div className="text-sm font-medium text-blue-700 mb-2">{tbName} - {section.chapter_name}</div>
                            <div className="grid grid-cols-5 sm:grid-cols-8 md:grid-cols-10 gap-2">
                              {section.problems.map(p => {
                                const result = sub.results?.[section.id]?.[String(p)];
                                return (
                                  <div key={p} className={`text-center rounded-lg p-2 ${result === 'O' ? 'bg-blue-100' : result === 'X' ? 'bg-red-100' : 'bg-gray-100'}`}>
                                    <div className="text-xs text-gray-500">{p}번</div>
                                    <div className={`font-bold ${result === 'O' ? 'text-blue-600' : 'text-red-600'}`}>{result || '-'}</div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        );
                      })
                    ) : (
                      <div className="grid grid-cols-5 sm:grid-cols-8 md:grid-cols-10 gap-2">
                        {(expandedHw.problems || []).map(p => {
                          const result = sub.results?.[String(p)];
                          return (
                            <div key={p} className={`text-center rounded-lg p-2 ${result === 'O' ? 'bg-blue-100' : result === 'X' ? 'bg-red-100' : 'bg-gray-100'}`}>
                              <div className="text-xs text-gray-500">{p}번</div>
                              <div className={`font-bold ${result === 'O' ? 'text-blue-600' : 'text-red-600'}`}>{result || '-'}</div>
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })()}

              {/* 문항별 오답률 */}
              {submissions.length > 0 && (() => {
                const sections = expandedHw.sections || [];
                const hasSections = sections.length > 0;

                const renderErrorGrid = (problems, rates) => (
                  <>
                    <div className="grid grid-cols-5 sm:grid-cols-8 md:grid-cols-10 gap-2">
                      {problems.map(p => (
                        <div key={p} className={`text-center rounded-lg p-2 ${getColor(rates[p])}`}>
                          <div className="text-xs text-gray-600">{p}번</div>
                          <div className="font-bold text-sm">{rates[p] !== null ? rates[p] + '%' : '-'}</div>
                        </div>
                      ))}
                    </div>
                    {(() => {
                      const bands = [
                        { label: '0%', color: 'text-blue-500', test: r => r === 0 },
                        { label: '1~25%', color: 'text-green-500', test: r => r >= 1 && r <= 25 },
                        { label: '26~50%', color: 'text-yellow-500', test: r => r >= 26 && r <= 50 },
                        { label: '51~75%', color: 'text-orange-500', test: r => r >= 51 && r <= 75 },
                        { label: '76~100%', color: 'text-red-500', test: r => r >= 76 },
                      ];
                      return (
                        <div className="mt-3 space-y-1 text-sm">
                          {bands.map(band => {
                            const nums = problems.filter(p => rates[p] !== null && band.test(rates[p]));
                            if (nums.length === 0) return null;
                            return (
                              <div key={band.label}>
                                <span className={`font-bold ${band.color}`}>●</span>
                                <span className={`font-semibold ${band.color} ml-1`}>{band.label}</span>
                                <span className="text-gray-600"> ({nums.length}개): {nums.map(n => n + '번').join(', ')}</span>
                              </div>
                            );
                          })}
                        </div>
                      );
                    })()}
                  </>
                );

                return (
                  <div className="bg-gray-50 border rounded-lg p-4">
                    <h4 className="font-bold mb-3">문항별 오답률</h4>
                    {hasSections ? (
                      sections.map(section => {
                        const tbName = section.omr_textbooks?.name || getTextbookName(section.textbook_id);
                        const rates = errorRatesBySection[section.id] || {};
                        return (
                          <div key={section.id} className="mb-4">
                            <div className="text-sm font-medium text-blue-700 mb-2">{tbName} - {section.chapter_name}</div>
                            {renderErrorGrid(section.problems, rates)}
                          </div>
                        );
                      })
                    ) : (
                      renderErrorGrid(expandedHw.problems || [], errorRatesBySection._legacy || {})
                    )}
                  </div>
                );
              })()}
            </div>
          </div>
        </div>
      )}

      {showAddHwModal && <AddHomeworkModal textbooks={textbooks} onAdd={createHomework} onClose={() => setShowAddHwModal(false)} />}
    </div>
  );
}

// ── 학생 뷰 ──
function StudentView({ user, onLogout, onUserUpdate }) {
  const [homeworks, setHomeworks] = useState([]);
  const [mySubmissions, setMySubmissions] = useState([]);
  const [selectedHw, setSelectedHw] = useState(null);
  const [showPwModal, setShowPwModal] = useState(false);

  const load = async () => {
    const [hw, subs] = await Promise.all([
      DB.getHomeworksWithSections(user.class_id),
      DB.getStudentSubmissions(user.id),
    ]);
    setHomeworks(hw);
    setMySubmissions(subs);
  };
  useEffect(() => { load(); }, []);

  const submittedHwIds = new Set(mySubmissions.map(s => s.homework_id));

  return (
    <div className="max-w-2xl mx-auto p-4">
      <Header title={`${user.name}`} onLogout={onLogout} onPasswordChange={() => setShowPwModal(true)} />
      {showPwModal && <PasswordModal role="student" user={user} onClose={() => setShowPwModal(false)} onChanged={pw => onUserUpdate({ ...user, password: pw })} />}

      {selectedHw ? (
        <OXSubmission homework={selectedHw} studentId={user.id} onBack={() => { setSelectedHw(null); load(); }} existingSubmission={mySubmissions.find(s => s.homework_id === selectedHw.id)} />
      ) : (
        <div className="bg-white rounded-xl shadow p-6">
          <h2 className="text-lg font-bold mb-4">과제 목록</h2>
          <div className="space-y-2">
            {homeworks.map(h => {
              const submitted = submittedHwIds.has(h.id);
              const sub = mySubmissions.find(s => s.homework_id === h.id);
              const totalP = getTotalProblems(h);
              const sectionInfo = (h.sections || []).map(s => {
                const tbName = s.omr_textbooks?.name || '';
                return `${tbName} - ${s.chapter_name}`;
              });
              return (
                <button key={h.id} className="w-full text-left bg-gray-50 hover:bg-gray-100 rounded-lg p-4 flex items-center justify-between" onClick={() => setSelectedHw(h)}>
                  <div className="min-w-0 flex-1">
                    <div className="flex items-center gap-2">
                      <span className="font-medium">{h.title}</span>
                      <span className="text-gray-500 text-sm">({totalP}문제)</span>
                    </div>
                    {sectionInfo.length > 0 && (
                      <div className="text-xs text-gray-400 mt-1 truncate">{sectionInfo.join(' / ')}</div>
                    )}
                  </div>
                  <div className="flex-shrink-0 ml-2">
                    {submitted ? (
                      <span className="bg-green-100 text-green-700 text-sm px-3 py-1 rounded-full">{sub.correct_count}O / {sub.wrong_count}X 제출완료</span>
                    ) : (
                      <span className="bg-gray-200 text-gray-600 text-sm px-3 py-1 rounded-full">미제출</span>
                    )}
                  </div>
                </button>
              );
            })}
            {homeworks.length === 0 && <p className="text-gray-400 text-center py-8">등록된 과제가 없습니다.</p>}
          </div>
        </div>
      )}
    </div>
  );
}

// ── O/X 입력 (단원별 구분) ──
function OXSubmission({ homework, studentId, onBack, existingSubmission }) {
  const [markedBySection, setMarkedBySection] = useState({});
  // 레거시용
  const [markedLegacy, setMarkedLegacy] = useState(new Set());
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);

  const sections = homework.sections || [];
  const hasSections = sections.length > 0;

  useEffect(() => {
    if (existingSubmission?.results) {
      if (hasSections) {
        const newMarked = {};
        for (const section of sections) {
          const sectionResults = existingSubmission.results[section.id];
          if (sectionResults) {
            const wrongSet = new Set();
            for (const [key, val] of Object.entries(sectionResults)) {
              if (val === 'X') wrongSet.add(parseInt(key));
            }
            newMarked[section.id] = wrongSet;
          }
        }
        setMarkedBySection(newMarked);
      } else {
        const wrongSet = new Set();
        for (const [key, val] of Object.entries(existingSubmission.results)) {
          if (val === 'X') wrongSet.add(parseInt(key));
        }
        setMarkedLegacy(wrongSet);
      }
      setSubmitted(true);
    }
  }, [existingSubmission]);

  const toggleSection = (sectionId, num) => {
    setMarkedBySection(prev => {
      const next = { ...prev };
      const set = new Set(next[sectionId] || []);
      if (set.has(num)) set.delete(num);
      else set.add(num);
      next[sectionId] = set;
      return next;
    });
    setSubmitted(false);
  };

  const toggleLegacy = (num) => {
    setMarkedLegacy(prev => {
      const next = new Set(prev);
      if (next.has(num)) next.delete(num);
      else next.add(num);
      return next;
    });
    setSubmitted(false);
  };

  // 총계 계산
  let totalProblems = 0;
  let totalWrong = 0;
  if (hasSections) {
    for (const section of sections) {
      totalProblems += section.problems.length;
      totalWrong += (markedBySection[section.id]?.size || 0);
    }
  } else {
    totalProblems = (homework.problems || []).length;
    totalWrong = markedLegacy.size;
  }
  const totalCorrect = totalProblems - totalWrong;

  const handleSubmit = async () => {
    setSubmitting(true);
    let results = {};

    if (hasSections) {
      for (const section of sections) {
        const sectionResult = {};
        for (const p of section.problems) {
          sectionResult[String(p)] = (markedBySection[section.id]?.has(p)) ? 'X' : 'O';
        }
        results[section.id] = sectionResult;
      }
    } else {
      for (const p of (homework.problems || [])) {
        results[String(p)] = markedLegacy.has(p) ? 'X' : 'O';
      }
    }

    const payload = {
      student_id: studentId,
      homework_id: homework.id,
      results,
      correct_count: totalCorrect,
      wrong_count: totalWrong,
      submitted_at: new Date().toISOString(),
    };
    if (existingSubmission) {
      await sb.from('omr_submissions').update(payload).eq('id', existingSubmission.id);
    } else {
      await sb.from('omr_submissions').upsert(payload, { onConflict: 'student_id,homework_id' });
    }
    setSubmitting(false);
    setSubmitted(true);
  };

  const renderProblemGrid = (problems, isWrongFn, onToggle) => (
    <div className="grid grid-cols-5 sm:grid-cols-6 md:grid-cols-8 gap-2">
      {problems.map(p => {
        const isWrong = isWrongFn(p);
        return (
          <button key={p} className={`ox-btn rounded-lg p-3 text-center border-2 ${isWrong ? 'border-red-500 bg-red-50' : 'border-gray-200 bg-white hover:border-gray-300'}`} onClick={() => onToggle(p)}>
            <div className="text-xs text-gray-500 mb-1">{p}번</div>
            <div className={`text-xl font-bold ${isWrong ? 'text-red-600' : 'text-gray-300'}`}>
              {isWrong ? 'X' : '-'}
            </div>
          </button>
        );
      })}
    </div>
  );

  return (
    <div className="bg-white rounded-xl shadow p-6">
      <div className="flex items-center justify-between mb-4">
        <button className="text-blue-600 hover:underline" onClick={onBack}>&larr; 목록으로</button>
        <h2 className="font-bold text-lg">{homework.title}</h2>
        <div className="text-sm text-gray-500">{totalProblems}문제</div>
      </div>

      <div className="bg-gray-50 rounded-lg p-3 mb-4 text-center text-sm text-gray-600">
        틀린 문제만 클릭하세요. 클릭하지 않은 문제는 정답(O)으로 처리됩니다.
      </div>

      {submitted && (
        <div className="bg-green-50 border border-green-200 rounded-lg p-3 mb-4 text-center">
          <p className="text-green-800 font-medium">제출 완료! {totalCorrect}O / {totalWrong}X</p>
          <p className="text-green-600 text-sm mt-1">아래에서 수정 후 다시 제출할 수 있습니다.</p>
        </div>
      )}

      {hasSections ? (
        <div className="space-y-6 mb-6">
          {sections.map(section => {
            const tbName = section.omr_textbooks?.name || '';
            const sectionWrong = markedBySection[section.id]?.size || 0;
            const sectionCorrect = section.problems.length - sectionWrong;
            return (
              <div key={section.id}>
                <div className="bg-blue-50 rounded-lg p-3 mb-3">
                  <div className="font-medium text-blue-800">{tbName}</div>
                  <div className="text-sm text-blue-600">{section.chapter_name}</div>
                  <div className="text-xs text-blue-400 mt-1">{section.problems.length}문제 ({sectionCorrect}O / {sectionWrong}X)</div>
                </div>
                {renderProblemGrid(
                  section.problems,
                  (p) => markedBySection[section.id]?.has(p),
                  (p) => toggleSection(section.id, p)
                )}
              </div>
            );
          })}
        </div>
      ) : (
        <div className="mb-6">
          {renderProblemGrid(
            homework.problems || [],
            (p) => markedLegacy.has(p),
            toggleLegacy
          )}
        </div>
      )}

      <div className="flex items-center justify-between">
        <div className="text-sm text-gray-600">
          <span className="text-blue-600 font-medium">{totalCorrect}O</span> / <span className="text-red-600 font-medium">{totalWrong}X</span>
        </div>
        <button className="px-6 py-3 rounded-lg font-semibold bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-50" onClick={handleSubmit} disabled={submitting}>
          {submitting ? '제출 중...' : submitted ? '다시 제출' : '제출'}
        </button>
      </div>
    </div>
  );
}

  return (
    <div className="flex items-center justify-between mb-4">
      <div className="flex items-center gap-3">
        <img src="./logo.png" alt="더맺음" className="h-7 object-contain" onError={e => e.target.style.display='none'} />
        <h1 className="text-xl font-bold text-gray-800">{title}</h1>
      </div>
      <div className="flex gap-2">
        {onPasswordChange && <button className="text-sm text-gray-600 hover:underline" onClick={onPasswordChange}>비밀번호 변경</button>}
        <button className="text-sm text-red-600 hover:underline" onClick={onLogout}>로그아웃</button>
      </div>
    </div>
  );
}

// ── 메인 앱 ──
function App() {
  const [session, setSession] = useState(null);

  const handleLogin = (s) => setSession(s);
  const handleLogout = () => setSession(null);
  const handleUserUpdate = (updatedUser) => setSession(prev => ({ ...prev, user: updatedUser }));

  if (!session) return <LoginView onLogin={handleLogin} />;
  if (session.role === 'teacher') return <TeacherView user={session.user} onLogout={handleLogout} onUserUpdate={handleUserUpdate} />;
  if (session.role === 'student') return <StudentView user={session.user} onLogout={handleLogout} onUserUpdate={handleUserUpdate} />;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Service Worker 등록
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
